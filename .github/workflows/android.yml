name: Build & Release APK

on:
  push:
    tags:
      - 'v*'  # Triggers only when you push a tag like v1.0, v1.0.1, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Prepare Release APK
        run:
          mkdir -p app/build/release/
          cp app/build/outputs/apk/release/*.apk app/build/release/release-simplentpchecker-unsigned.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/release/release-simplentpchecker-unsigned.apk
          token: ${{ secrets.GITHUB_TOKEN }}
