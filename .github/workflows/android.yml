name: Android Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Rename APK to release-unsigned.apk
        run: |
          mkdir -p app/release
          find app/build/outputs/apk/release/ -name "*.apk" | head -n 1 | xargs -I {} cp {} app/release/release-unsigned.apk

      - name: Upload APK as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: app/release/release-unsigned.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            ### Download
            - `release-unsigned.apk` — unsigned release build (sign before installing)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-unsigned-${{ github.ref_name }}
          path: app/release/release-unsigned.apk
          retention-days: 30